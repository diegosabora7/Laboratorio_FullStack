spring:
  application:
    name: task-service
  datasource:
    url: jdbc:postgresql://localhost:5433/tasks_db
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 600000
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8081

user-service:
  url: http://localhost:8082

# ═══════════════════════════════════════════════════════════════════════════════
# SOLUCIÓN BUG 3 - Configuración de Resilience4j Circuit Breaker
# ═══════════════════════════════════════════════════════════════════════════════
# slidingWindowSize: 5 → Evalúa las últimas 5 llamadas para calcular tasa de fallo
# minimumNumberOfCalls: 3 → Necesita al menos 3 llamadas antes de evaluar
# permittedNumberOfCallsInHalfOpenState: 3 → En estado HALF_OPEN permite 3 llamadas de prueba
# waitDurationInOpenState: 10s → Cuando el circuito está OPEN, espera 10s antes de pasar a HALF_OPEN
# failureRateThreshold: 50 → Si 50% o más de las llamadas fallan, abre el circuito
#
# Estados del Circuit Breaker:
# CLOSED → Funcionamiento normal, las llamadas pasan al user-service
# OPEN → Demasiados fallos, las llamadas van directo al fallback sin intentar
# HALF_OPEN → Después de waitDuration, permite algunas llamadas de prueba
# ═══════════════════════════════════════════════════════════════════════════════
resilience4j:
  circuitbreaker:
    instances:
      userService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  retry:
      instances:
        userService:
          maxAttempts: 3
          waitDuration: 1s
          enableExponentialBackoff: true
          exponentialBackoffMultiplier: 2
          retryExceptions:
            - org.springframework.web.client.ResourceAccessException

show-sql: true